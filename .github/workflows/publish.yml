name: Publish to npm & GitHub Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0, 1.1.0, 2.0.0)'
        required: true
        type: string

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Set version
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version --allow-same-version

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump & tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --cached --quiet || git commit -m "release: v${{ github.event.inputs.version }}"
          git tag -f "v${{ github.event.inputs.version }}"
          git push origin HEAD --tags --force

  publish-github:
    runs-on: ubuntu-latest
    needs: publish-npm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 'v${{ github.event.inputs.version }}'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@lzinga'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure package for GitHub Packages
        run: |
          node -e "
            import { readFileSync, writeFileSync } from 'fs';
            const pkg = JSON.parse(readFileSync('package.json', 'utf-8'));
            pkg.name = '@lzinga/us-gov-open-data-mcp';
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };
            writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          " --input-type=module

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
